{% extends "layout.html" %}

{% block head_content %} 
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
{% endblock %}

{% block main_content %}

  <form name="login" method="get" action="{{ url_for('pages.login_microsoft') }}" class="form">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <span class="form__flash form__flash--{{ category }}">{{ message }}</span>
      {% endfor %}
    {% endwith %}

    <div class="form__container">
      <div class="form__container--Microsoft">
        <button type="submit" class="button button--form button--Microsoft">
          Sign in with Microsoft
        </button>
      </div>

      <span class="form__small">
        Use your Microsoft account to sign in.
      </span>
    </div>
  </form>

{% endblock %}
